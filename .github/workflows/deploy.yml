name: Deploy Trend Scout

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          VITE_GROQ_API_KEY:                   ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_SERPER_API_KEY:                 ${{ secrets.VITE_SERPER_API_KEY }}
          VITE_FIREBASE_API_KEY:               ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:           ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:            ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:        ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:   ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:                ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_WP_BASE_URL:                    ${{ secrets.VITE_WP_BASE_URL }}
          VITE_WP_USERNAME:                    ${{ secrets.VITE_WP_USERNAME }}
          VITE_WP_APP_PASSWORD:                ${{ secrets.VITE_WP_APP_PASSWORD }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
